# Profil utilisé par les tests d'intégration Testcontainers
# Les URLs sont écrasées dynamiquement par @DynamicPropertySource dans AbstractIntegrationTest

# En tests d'intégration, Flyway gère le schéma — on désactive la validation Hibernate
# pour éviter les faux positifs sur les types PostgreSQL natifs (SMALLINT vs int2, etc.)
spring.jpa.hibernate.ddl-auto=none

# Logs SQL désactivés pour ne pas polluer la sortie des tests
spring.jpa.show-sql=false

# Email désactivé en test — pas de vrai SMTP
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Firebase désactivé — variable vide = skip silencieux dans FirebaseConfig
firebase.service-account-base64=

# Métriques Micrometer désactivées en test
management.metrics.export.simple.enabled=false
