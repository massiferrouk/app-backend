spring.application.name=backend

# Base de donn�es PostgreSQL Railway
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/yunivdb}
spring.datasource.username=${DATABASE_USERNAME:yuniv}
spring.datasource.password=${DATABASE_PASSWORD:yuniv123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Hibernate ne touche pas au sch�ma, c'est Flyway qui gere
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.execute-in-transaction=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-change-this-in-production-must-be-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Actuator — endpoints exposés
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ADMIN
# Liveness et readiness publics — utilisés par Railway pour savoir si l'app tourne
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket.logements=${MINIO_BUCKET_LOGEMENTS:logements}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Email SMTP (SendGrid en prod, desactive en dev)
spring.mail.host=${SMTP_HOST:smtp.sendgrid.net}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:apikey}
spring.mail.password=${SMTP_PASSWORD:dev-disabled}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email expediteur et URL de base pour les liens dans les emails
app.mail.from=${FROM_EMAIL:noreply@studup.fr}
app.base-url=${APP_BASE_URL:http://localhost:8080}