spring.application.name=backend

# Base de donn’┐Įes PostgreSQL Railway
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - Hibernate ne touche pas au sch’┐Įma, c'est Flyway qui gere
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.execute-in-transaction=false

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-change-this-in-production-must-be-256-bits}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always