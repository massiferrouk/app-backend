# Profil « demo » — jeu de données de démonstration
#
# Activation :   ./mvnw spring-boot:run -Dspring-boot.run.profiles=demo
#          ou :  SPRING_PROFILES_ACTIVE=demo (variable d'environnement, Docker)
#
# Ce profil n'est JAMAIS activé en production.

# 1. Ajoute le jeu de démonstration (classpath:db/demo) aux emplacements scannés
#    par Flyway. Le schéma reste géré par db/migration, inchangé : le jeu de
#    démonstration est un ajout de données, jamais une modification de schéma.
spring.flyway.locations=classpath:db/migration,classpath:db/demo

# 2. Confirme automatiquement les comptes créés à l'inscription, sans e-mail.
#    En local il n'y a pas de clé SendGrid : l'e-mail de confirmation ne part
#    jamais, et un compte auto-créé resterait bloqué au login. Ce drapeau rend
#    le flux d'inscription utilisable de bout en bout pour une démonstration.
#    En production, il reste à false : la confirmation d'e-mail est une vraie
#    barrière de sécurité (US-001).
app.auto-confirm-accounts=true
